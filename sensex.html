<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>SENSEX 30 - Fusion Finance</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header class="topbar">
  <div class="brand">Fusion <span>Finance</span></div>
  <nav class="nav">
    <a href="dashboard.html" class="navlink">Dashboard</a>
    <a href="analysis.html" class="navlink">Total Analysis</a>
    <a href="twitter.html" class="navlink">Twitter</a>
    <a href="instagram.html" class="navlink">Instagram</a>
    <a href="stocktwits.html" class="navlink">StockTwits</a>
  </nav>
</header>

<main class="container-single">
  <section class="card">
    <div class="table-legend">
      <h2>SENSEX 30 — Live Prices</h2>
      <div><button class="btn ghost" onclick="location.href='dashboard.html'">Back</button></div>
    </div>

    <table class="stock-table">
      <thead>
        <tr><th>#</th><th>Company</th><th>Symbol</th><th>Price (₹)</th><th>Change %</th></tr>
      </thead>
      <tbody id="sensex-table-body"></tbody>
    </table>
  </section>
</main>

<script>
const API_KEY = "vGB2q8IoZpoONcoutgwSYAd2RcALemb7";

const SENSEX = [
  ["Reliance","RELIANCE.NS"],["TCS","TCS.NS"],["HDFC","HDFCBANK.NS"],["Infosys","INFY.NS"],
  ["ICICI Bank","ICICIBANK.NS"],["Kotak Bank","KOTAKBANK.NS"],["HUL","HINDUNILVR.NS"],
  ["ITC","ITC.NS"],["SBI","SBIN.NS"],["L&T","LT.NS"],["Axis Bank","AXISBANK.NS"],
  ["Bajaj Finance","BAJFINANCE.NS"],["Sun Pharma","SUNPHARMA.NS"],["Maruti Suzuki","MARUTI.NS"],
  ["Dr Reddy","DRREDDY.NS"],["Titan","TITAN.NS"],["ONGC","ONGC.NS"],["Ultratech Cement","ULTRACEMCO.NS"],
  ["Power Grid","POWERGRID.NS"],["Tech Mahindra","TECHM.NS"],["Bharti Airtel","BHARTIARTL.NS"],
  ["Bajaj Auto","BAJAJ-AUTO.NS"],["HCL Tech","HCLTECH.NS"],["Tata Steel","TATASTEEL.NS"],
  ["Hindalco","HINDALCO.NS"],["Nestle","NESTLEIND.NS"],["JSW Steel","JSWSTEEL.NS"],
  ["Cipla","CIPLA.NS"],["M&M","M&M.NS"],["Asian Paints","ASIANPAINTS.NS"]
];

async function fetchBatch(symbols){
  const list = symbols.join(',');
  const url = `https://financialmodelingprep.com/api/v3/quote/${list}?apikey=${API_KEY}`;
  const r = await fetch(url);
  return r.ok ? r.json() : [];
}

async function loadSensex(){
  const body = document.getElementById('sensex-table-body');
  body.innerHTML = '<tr><td colspan="5">Loading...</td></tr>';

  const chunkSize = 20;
  let resultsMap = {};
  for(let i=0;i<SENSEX.length;i+=chunkSize){
    const chunk = SENSEX.slice(i,i+chunkSize).map(x=>x[1]);
    const data = await fetchBatch(chunk);
    if(Array.isArray(data)){
      data.forEach(item => { if(item && item.symbol) resultsMap[item.symbol] = item; });
    }
  }

  body.innerHTML = '';
  SENSEX.forEach((c, idx)=>{
    const sym = c[1];
    const info = resultsMap[sym] || {};
    const price = info.price !== undefined ? info.price.toFixed(2) : 'N/A';
    const change = info.changesPercentage !== undefined ? info.changesPercentage.toFixed(2) : 'N/A';
    const color = (info.changesPercentage||0) >= 0 ? 'style="color:#059669"' : 'style="color:#dc2626"';
    const row = `<tr><td>${idx+1}</td><td>${c[0]}</td><td>${sym}</td><td>${price}</td><td ${color}>${change === 'N/A' ? change : change + '%'}</td></tr>`;
    body.innerHTML += row;
  });
}

loadSensex();
</script>

<script src="app.js"></script>
</body>
</html>
